<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Jasper Ling Digital Namecard</title>

  <!-- BEBAS NEUE -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#e9e9e9;
      overflow-x:hidden;
      font-family:"Century Gothic", sans-serif;
    }

    /* =========================
       HERO SECTION
    ========================== */

    .hero{
      background:#e50000;
      min-height:100vh;
      position:relative;
      overflow:hidden;
    }

    .hero-content{
      position:relative;
      width:100%;
      max-width:1200px;
      margin:auto;
      min-height:100vh;
    }

    /* NAME */

    .name{
      position:absolute;
      top:80px;
      left:40px;
      z-index:5;
      animation:slideLeft 1s ease;
    }

    .name h1{
      font-family:'Bebas Neue', sans-serif;
      font-size:180px;
      line-height:0.8;
      color:black;
      letter-spacing:2px;
    }

    .designation{
      position:absolute;
      left:40px;
      bottom:240px;
      z-index:5;
      animation:fadeUp 1.2s ease;
    }

    .designation p{
      font-size:40px;
      color:black;
      line-height:1.2;
    }

    /* PERSON IMAGE */

    .person{
      position:absolute;
      right:0;
      bottom:0;
      width:50%;
      animation:fadeIn 1.5s ease;
    }

    .person img{
      width:100%;
      display:block;
    }

    /* =========================
       CONTACT SECTION
    ========================== */

    .contact-section{
      background:#efefef;
      padding:80px 30px 100px;
      text-align:center;
    }

    .contact-btn{
      width:80%;
      max-width:700px;
      margin:25px auto;
      padding:28px;
      background:#f00000;
      border-radius:80px;
      text-decoration:none;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
      color:black;
      font-size:42px;
      font-weight:bold;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .contact-btn:hover{
      transform:translateY(-5px) scale(1.02);
    }

    .social-row{
      width:80%;
      max-width:700px;
      margin:auto;
      display:flex;
      justify-content:space-between;
      gap:20px;
    }

    .social-btn{
      flex:1;
      padding:28px;
      background:#f00000;
      border-radius:80px;
      text-decoration:none;
      color:black;
      font-size:34px;
      font-weight:bold;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .social-btn:hover{
      transform:translateY(-5px);
    }

    /* COMPANY */

    .company{
      margin-top:60px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:25px;
      animation:fadeUp 1s ease;
    }

    .company img{
      width:120px;
    }

    .company h2{
      font-family:'Bebas Neue', sans-serif;
      font-size:72px;
      letter-spacing:1px;
      color:black;
    }

    /* =========================
       DARK MODE
    ========================== */

    .toggle-mode{
      position:fixed;
      top:25px;
      right:25px;
      width:65px;
      height:65px;
      border:none;
      border-radius:50%;
      background:black;
      color:white;
      font-size:24px;
      cursor:pointer;
      z-index:999;
      transition:0.3s;
    }

    body.dark{
      background:#111;
    }

    body.dark .contact-section{
      background:#1a1a1a;
    }

    body.dark .company h2,
    body.dark .designation p{
      color:white;
    }

    body.dark .contact-btn,
    body.dark .social-btn{
      color:white;
    }

    /* =========================
       ANIMATIONS
    ========================== */

    @keyframes slideLeft{
      from{
        opacity:0;
        transform:translateX(-100px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(80px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:768px){

      .hero{
        min-height:780px;
      }

      .name{
        top:40px;
        left:20px;
      }

      .name h1{
        font-size:110px;
      }

      .designation{
        left:20px;
        bottom:140px;
      }

      .designation p{
        font-size:28px;
      }

      .person{
        width:70%;
      }

      .contact-btn{
        width:95%;
        font-size:24px;
        padding:22px;
      }

      .social-row{
        width:95%;
      }

      .social-btn{
        font-size:22px;
        padding:20px;
      }

      .company{
        flex-direction:column;
        gap:10px;
      }

      .company img{
        width:90px;
      }

      .company h2{
        font-size:48px;
        text-align:center;
      }

    }

  </style>
</head>

<body>

  <!-- DARK MODE BUTTON -->

  <button class="toggle-mode" id="toggleMode">
    <i class="fa-solid fa-moon"></i>
  </button>

  <!-- HERO -->

  <section class="hero">

    <div class="hero-content">

      <div class="name">
        <h1>JASPER</h1>
        <h1>LING</h1>
      </div>

      <div class="designation">
        <p>Unit Manager</p>
        <p>Executive Wealth Planner</p>
      </div>

      <div class="person">
        <img src="jasper.png" alt="Jasper Ling">
      </div>

    </div>

  </section>

  <!-- CONTACT -->

  <section class="contact-section">

    <a href="tel:+60123456789" class="contact-btn">
      <i class="fa-solid fa-phone"></i>
      CALL
    </a>

    <a href="https://wa.me/60123456789" class="contact-btn">
      <i class="fa-brands fa-whatsapp"></i>
      WHATSAPP
    </a>

    <a href="mailto:example@email.com" class="contact-btn">
      <i class="fa-solid fa-envelope"></i>
      EMAIL
    </a>

    <div class="social-row">

      <a href="#" class="social-btn">
        <i class="fa-brands fa-facebook-f"></i>
        FACEBOOK
      </a>

      <a href="#" class="social-btn">
        <i class="fa-brands fa-instagram"></i>
        INSTAGRAM
      </a>

    </div>

    <!-- COMPANY -->

    <div class="company">

      <img src="logo.png" alt="Journey Life Assurance">

      <h2>JOURNEY LIFE ASSURANCE</h2>

    </div>

  </section>

  <script>

    // DARK MODE

    const toggleBtn = document.getElementById("toggleMode");

    toggleBtn.addEventListener("click", () => {

      document.body.classList.toggle("dark");

      if(document.body.classList.contains("dark")){
        toggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
      }else{
        toggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
      }

    });

  </script>

</body>
</html>
